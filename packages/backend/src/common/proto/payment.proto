syntax = "proto3";

package net4xyz.payment;

service PaymentService {
  rpc CreatePayment (CreatePaymentRequest) returns (PaymentResponse);
  rpc GetPayment (GetPaymentRequest) returns (PaymentResponse);
  rpc VerifyPayment (VerifyPaymentRequest) returns (PaymentResponse);
  rpc CancelPayment (CancelPaymentRequest) returns (PaymentResponse);
  rpc GetPaymentHistory (GetPaymentHistoryRequest) returns (PaymentHistoryResponse);
}

message CreatePaymentRequest {
  string user_id = 1;
  string amount = 2;
  string currency = 3;
  string payment_method = 4;
  string description = 5;
}

message GetPaymentRequest {
  string payment_id = 1;
}

message VerifyPaymentRequest {
  string payment_id = 1;
  string transaction_hash = 2;
}

message CancelPaymentRequest {
  string payment_id = 1;
}

message GetPaymentHistoryRequest {
  string user_id = 1;
  int32 limit = 2;
  int32 offset = 3;
}

message PaymentResponse {
  string id = 1;
  string user_id = 2;
  string amount = 3;
  string currency = 4;
  string payment_method = 5;
  string status = 6;
  string transaction_hash = 7;
  string description = 8;
  int64 created_at = 9;
  int64 updated_at = 10;
}

message PaymentHistoryResponse {
  repeated PaymentResponse payments = 1;
  int32 total = 2;
}