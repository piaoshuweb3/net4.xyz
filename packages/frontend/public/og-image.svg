<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="40%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <radialGradient id="glow1" cx="15%" cy="20%" r="30%">
      <stop offset="0%" stop-color="rgba(176,38,255,0.15)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="glow2" cx="80%" cy="70%" r="35%">
      <stop offset="0%" stop-color="rgba(0,212,255,0.1)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="nodeGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Grid pattern -->
  <g opacity="0.06" stroke="#b026ff" stroke-width="0.5">
    <line x1="0" y1="60" x2="1200" y2="60"/><line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="180" x2="1200" y2="180"/><line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="300" x2="1200" y2="300"/><line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="420" x2="1200" y2="420"/><line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="0" y1="540" x2="1200" y2="540"/><line x1="0" y1="600" x2="1200" y2="600"/>
    <line x1="60" y1="0" x2="60" y2="630"/><line x1="120" y1="0" x2="120" y2="630"/>
    <line x1="180" y1="0" x2="180" y2="630"/><line x1="240" y1="0" x2="240" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/><line x1="360" y1="0" x2="360" y2="630"/>
    <line x1="420" y1="0" x2="420" y2="630"/><line x1="480" y1="0" x2="480" y2="630"/>
    <line x1="540" y1="0" x2="540" y2="630"/><line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="660" y1="0" x2="660" y2="630"/><line x1="720" y1="0" x2="720" y2="630"/>
    <line x1="780" y1="0" x2="780" y2="630"/><line x1="840" y1="0" x2="840" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/><line x1="960" y1="0" x2="960" y2="630"/>
    <line x1="1020" y1="0" x2="1020" y2="630"/><line x1="1080" y1="0" x2="1080" y2="630"/>
    <line x1="1140" y1="0" x2="1140" y2="630"/>
  </g>

  <!-- Network nodes -->
  <g filter="url(#nodeGlow)">
    <circle cx="120" cy="100" r="6" fill="#b026ff" opacity="0.8"/>
    <circle cx="210" cy="480" r="5" fill="#b026ff" opacity="0.6"/>
    <circle cx="950" cy="130" r="7" fill="#b026ff" opacity="0.8"/>
    <circle cx="1020" cy="460" r="5" fill="#b026ff" opacity="0.6"/>
    <circle cx="600" cy="315" r="8" fill="#00d4ff" opacity="0.9"/>
    <circle cx="350" cy="200" r="5" fill="#b026ff" opacity="0.7"/>
    <circle cx="780" cy="400" r="6" fill="#00d4ff" opacity="0.7"/>
    <circle cx="160" cy="300" r="4" fill="#00d4ff" opacity="0.5"/>
    <circle cx="880" cy="250" r="4" fill="#b026ff" opacity="0.5"/>
  </g>

  <!-- Connection lines -->
  <g opacity="0.15" stroke="#b026ff" stroke-width="1">
    <line x1="120" y1="100" x2="600" y2="315"/>
    <line x1="210" y1="480" x2="600" y2="315"/>
    <line x1="950" y1="130" x2="600" y2="315"/>
    <line x1="1020" y1="460" x2="600" y2="315"/>
    <line x1="350" y1="200" x2="600" y2="315"/>
    <line x1="780" y1="400" x2="600" y2="315"/>
  </g>
  <g opacity="0.1" stroke="#00d4ff" stroke-width="1">
    <line x1="350" y1="200" x2="780" y2="400"/>
    <line x1="120" y1="100" x2="950" y2="130"/>
    <line x1="210" y1="480" x2="1020" y2="460"/>
  </g>

  <!-- Main Content -->
  <g text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">
    <!-- Logo -->
    <text x="600" y="240" font-size="80" font-weight="900" fill="#ffffff" letter-spacing="3" filter="url(#textGlow)">
      <tspan fill="#b026ff">net4</tspan>.xyz
    </text>

    <!-- Subtitle -->
    <text x="600" y="315" font-size="36" font-weight="700" fill="#e2ddd4" letter-spacing="10">
      Web4.0 AI 文明门户
    </text>

    <!-- Tagline -->
    <text x="600" y="380" font-size="22" fill="#9a9488" letter-spacing="5">
      AI 不再是工具，而是文明
    </text>
    <text x="600" y="420" font-size="18" fill="#6b665e" letter-spacing="4">
      基于 PoUE 共识机制 · 将电力转化为对人类有用的 AI 智能
    </text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="rgba(176,38,255,0.08)"/>
  <text x="600" y="615" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#6b665e" letter-spacing="4">
    PoUE 共识 · 感知互联网 · 11 个生态子域
  </text>
</svg>
