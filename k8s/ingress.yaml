# net4.xyz Kubernetes Ingress Configuration
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: net4xyz-ingress
  namespace: net4xyz
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/limit-connections: "100"
    nginx.ingress.kubernetes.io/limit-rps: "200"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
    - hosts:
        - net4.xyz
        - api.net4.xyz
      secretName: net4xyz-tls
  rules:
    - host: net4.xyz
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: net4xyz-frontend
                port:
                  number: 80
    - host: api.net4.xyz
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: net4xyz-backend
                port:
                  number: 80
---
# Ingress for monitoring
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: net4xyz-monitoring-ingress
  namespace: net4xyz
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/auth-type: basic
    nginx.ingress.kubernetes.io/auth-secret: net4xyz-basic-auth
spec:
  tls:
    - hosts:
        - metrics.net4.xyz
      secretName: net4xyz-metrics-tls
  rules:
    - host: metrics.net4.xyz
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: prometheus
                port:
                  number: 9090