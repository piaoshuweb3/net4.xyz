# net4.xyz Backend Kubernetes Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: net4xyz-backend
  namespace: net4xyz
  labels:
    app: backend
    tier: api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
        tier: api
    spec:
      containers:
        - name: backend
          image: net4xyz/backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
              name: http
          env:
            - name: NODE_ENV
              value: "production"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: net4xyz-secrets
                  key: database-url
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: net4xyz-secrets
                  key: jwt-secret
            - name: IPFS_URL
              value: "http://ipfs:5001"
          resources:
            requests:
              memory: "2Gi"
              cpu: "1000m"
            limits:
              memory: "4Gi"
              cpu: "2000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 5
---
# Backend Service
apiVersion: v1
kind: Service
metadata:
  name: net4xyz-backend
  namespace: net4xyz
spec:
  selector:
    app: backend
  ports:
    - name: http
      port: 80
      targetPort: 3001
  type: ClusterIP
---
# Backend HPA (Horizontal Pod Autoscaler)
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: net4xyz-backend-hpa
  namespace: net4xyz
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: net4xyz-backend
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80