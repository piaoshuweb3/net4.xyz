# net4.xyz Alert Manager Configuration

global:
  resolve_timeout: 5m
  smtp_smarthost: 'smtp.gmail.com:587'
  smtp_auth_username: '${SMTP_USERNAME}'
  smtp_auth_password: '${SMTP_PASSWORD}'
  smtp_from: 'net4xyz-alerts@gmail.com'

route:
  group_by: ['alertname', 'severity']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 12h
  receiver: 'default'
  routes:
    # Critical alerts - immediate notification
    - match:
        severity: critical
      receiver: 'critical-alerts'
      group_wait: 0s
      repeat_interval: 1h
    
    # Warning alerts - less urgent
    - match:
        severity: warning
      receiver: 'warning-alerts'
      group_wait: 30s

# Receivers
receivers:
  - name: 'default'
    email_configs:
      - to: 'alerts@net4.xyz'
        send_resolved: true
    webhook_configs:
      - url: 'http://backend:3001/api/alerts/webhook'
        send_resolved: true

  - name: 'critical-alerts'
    email_configs:
      - to: 'critical@net4.xyz'
        send_resolved: true
        headers:
          subject: '[CRITICAL] net4.xyz Alert: {{ .GroupLabels.alertname }}'
    webhook_configs:
      - url: 'http://backend:3001/api/alerts/webhook'
        send_resolved: true
    slack_configs:
      - api_url: '${SLACK_WEBHOOK_URL}'
        channel: '#critical-alerts'
        send_resolved: true
        title: '[CRITICAL] {{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'

  - name: 'warning-alerts'
    email_configs:
      - to: 'warnings@net4.xyz'
        send_resolved: true
        headers:
          subject: '[WARNING] net4.xyz Alert: {{ .GroupLabels.alertname }}'
    webhook_configs:
      - url: 'http://backend:3001/api/alerts/webhook'
        send_resolved: true

# Inhibition rules
inhibit_rules:
  # Inhibit warning alerts when critical is firing
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'instance']
  
  # Inhibit container alerts when host alerts are firing
  - source_match:
      alertname: 'HighCpuUsage'
    target_match_re:
      alertname: 'ContainerHigh.*'
    equal: ['instance']
  
  - source_match:
      alertname: 'HighMemoryUsage'
    target_match_re:
      alertname: 'ContainerHigh.*'
    equal: ['instance']