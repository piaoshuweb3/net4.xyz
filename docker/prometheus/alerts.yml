# net4.xyz Prometheus Alert Rules

groups:
  - name: net4xyz-backend
    interval: 30s
    rules:
      # Backend service alerts
      - alert: BackendDown
        expr: up{job="backend"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Backend service is down"
          description: "Backend instance {{ $labels.instance }} has been down for more than 1 minute"

      - alert: BackendHighResponseTime
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket{job="backend"}[5m])) > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Backend high response time"
          description: "Backend p95 response time is {{ $value }}s for {{ $labels.endpoint }}"

      - alert: BackendHighErrorRate
        expr: rate(http_requests_total{job="backend",status=~"5.."}[5m]) > 0.05
        for: 3m
        labels:
          severity: critical
        annotations:
          summary: "Backend high error rate"
          description: "Backend error rate is {{ $value | humanizePercentage }} for {{ $labels.endpoint }}"

      - alert: BackendHighCpuUsage
        expr: rate(process_cpu_seconds_total{job="backend"}[5m]) > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Backend high CPU usage"
          description: "Backend CPU usage is above 80% on {{ $labels.instance }}"

      - alert: BackendHighMemoryUsage
        expr: process_resident_memory_bytes{job="backend"} / process_max_memory_bytes{job="backend"} > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Backend high memory usage"
          description: "Backend memory usage is above 85% on {{ $labels.instance }}"

  - name: net4xyz-database
    interval: 30s
    rules:
      # MongoDB alerts
      - alert: MongoDBDown
        expr: up{job="mongodb"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "MongoDB is down"
          description: "MongoDB instance {{ $labels.instance }} has been down for more than 1 minute"

      - alert: MongoDBHighConnections
        expr: mongodb_connections{state="current"} / mongodb_connections{state="available"} > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "MongoDB high connection usage"
          description: "MongoDB connection usage is above 80% on {{ $labels.instance }}"

      - alert: MongoDBSlowQueries
        expr: rate(mongodb_op_counters_repl_latent_total[5m]) > 100
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "MongoDB slow queries"
          description: "MongoDB has high slow query rate on {{ $labels.instance }}"

  - name: net4xyz-system
    interval: 30s
    rules:
      # System-level alerts
      - alert: HighCpuUsage
        expr: 100 - (avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage"
          description: "System CPU usage is above 80% on {{ $labels.instance }}"

      - alert: HighMemoryUsage
        expr: (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage"
          description: "System memory usage is above 85% on {{ $labels.instance }}"

      - alert: HighDiskUsage
        expr: (1 - node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High disk usage"
          description: "Disk usage is above 85% on {{ $labels.instance }}"

      - alert: DiskSpaceLow
        expr: (1 - node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) * 100 > 90
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Disk space low"
          description: "Disk space is below 10% on {{ $labels.instance }}"

      - alert: SystemLoadHigh
        expr: node_load5 / count(node_cpu_seconds_total{mode="idle"}) > 4
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "System load high"
          description: "System load is high on {{ $labels.instance }}"

  - name: net4xyz-nginx
    interval: 30s
    rules:
      # Nginx alerts
      - alert: NginxDown
        expr: up{job="nginx"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Nginx is down"
          description: "Nginx has been down for more than 1 minute"

      - alert: NginxHighErrorRate
        expr: rate(nginx_http_requests_total{status=~"5.."}[5m]) > 0.05
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "Nginx high error rate"
          description: "Nginx error rate is above 5%"

      - alert: NginxHighResponseTime
        expr: histogram_quantile(0.95, rate(nginx_http_request_duration_seconds_bucket[5m])) > 3
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Nginx high response time"
          description: "Nginx p95 response time is above 3 seconds"

  - name: net4xyz-containers
    interval: 30s
    rules:
      # Container alerts
      - alert: ContainerDown
        expr: container_last_seen{name!=""} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Container is down"
          description: "Container {{ $labels.name }} has been down for more than 1 minute"

      - alert: ContainerHighCpu
        expr: rate(container_cpu_usage_seconds_total[5m]) > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Container high CPU"
          description: "Container {{ $labels.name }} CPU usage is above 90%"

      - alert: ContainerHighMemory
        expr: container_memory_usage_bytes / container_spec_memory_limit_bytes > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Container high memory"
          description: "Container {{ $labels.name }} memory usage is above 85% of limit"