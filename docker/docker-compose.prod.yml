# net4.xyz Production Docker Compose
# For cloud deployment with load balancing, monitoring, and logging

version: '3.8'

services:
  # ===================
  # Database Layer
  # ===================
  mongodb-primary:
    image: mongo:7.0
    container_name: net4xyz-mongodb-primary
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: net4xyz
      MONGO_REPLICA_SET_NAME: rs0
    volumes:
      - mongodb_data_primary:/data/db
      - mongodb_config:/data/configdb
    ports:
      - "27017:27017"
    command: ["--replSet", "rs0", "--bind_ip_all", "--wiredTigerCacheSizeGB", "4"]
    networks:
      - net4xyz-network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 8G
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb-secondary-1:
    image: mongo:7.0
    container_name: net4xyz-mongodb-secondary-1
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_REPLICA_SET_NAME: rs0
    volumes:
      - mongodb_data_secondary_1:/data/db
    ports:
      - "27018:27017"
    command: ["--replSet", "rs0", "--bind_ip_all", "--wiredTigerCacheSizeGB", "4"]
    networks:
      - net4xyz-network
    depends_on:
      mongodb-primary:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 8G

  mongodb-secondary-2:
    image: mongo:7.0
    container_name: net4xyz-mongodb-secondary-2
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_REPLICA_SET_NAME: rs0
    volumes:
      - mongodb_data_secondary_2:/data/db
    ports:
      - "27019:27017"
    command: ["--replSet", "rs0", "--bind_ip_all", "--wiredTigerCacheSizeGB", "4"]
    networks:
      - net4xyz-network
    depends_on:
      mongodb-primary:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 8G

  # ===================
  # Storage Layer
  # ===================
  ipfs:
    image: ipfs/kubo:v0.24.0
    container_name: net4xyz-ipfs
    restart: always
    environment:
      - IPFS_PROFILE=server
      - IPFS_SWARM_KEY=/key/swarm/psk/1.0.0/
      - LIBP2P_FORCE_PNET=1
    volumes:
      - ipfs_data:/data/ipfs
      - ipfs_staging:/staging
    ports:
      - "5001:5001"
      - "8080:8080"
      - "4001:4001"
    networks:
      - net4xyz-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 4G

  # ===================
  # Backend Services (Multiple replicas for load balancing)
  # ===================
  backend-1:
    build:
      context: ..
      dockerfile: packages/backend/Dockerfile
    container_name: net4xyz-backend-1
    restart: always
    environment:
      - NODE_ENV=production
      - DATABASE_URL=mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongodb-primary:27017,mongodb-secondary-1:27017,mongodb-secondary-2:27017/net4xyz?replicaSet=rs0&readPreference=secondaryPreferred
      - DATABASE_READ_URL=mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongodb-secondary-1:27017,mongodb-secondary-2:27017/net4xyz?replicaSet=rs0&readPreference=secondaryPreferred
      - DATABASE_WRITE_URL=mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongodb-primary:27017/net4xyz?replicaSet=rs0
      - JWT_SECRET=${JWT_SECRET}
      - IPFS_URL=http://ipfs:5001
      - PORT=3001
      - INSTANCE_ID=1
    ports:
      - "3001:3001"
    depends_on:
      mongodb-primary:
        condition: service_healthy
      - ipfs
    networks:
      - net4xyz-network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G

  backend-2:
    build:
      context: ..
      dockerfile: packages/backend/Dockerfile
    container_name: net4xyz-backend-2
    restart: always
    environment:
      - NODE_ENV=production
      - DATABASE_URL=mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongodb-primary:27017,mongodb-secondary-1:27017,mongodb-secondary-2:27017/net4xyz?replicaSet=rs0&readPreference=secondaryPreferred
      - DATABASE_READ_URL=mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongodb-secondary-1:27017,mongodb-secondary-2:27017/net4xyz?replicaSet=rs0&readPreference=secondaryPreferred
      - DATABASE_WRITE_URL=mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongodb-primary:27017/net4xyz?replicaSet=rs0
      - JWT_SECRET=${JWT_SECRET}
      - IPFS_URL=http://ipfs:5001
      - PORT=3001
      - INSTANCE_ID=2
    ports:
      - "3002:3001"
    depends_on:
      mongodb-primary:
        condition: service_healthy
      - ipfs
    networks:
      - net4xyz-network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G

  backend-3:
    build:
      context: ..
      dockerfile: packages/backend/Dockerfile
    container_name: net4xyz-backend-3
    restart: always
    environment:
      - NODE_ENV=production
      - DATABASE_URL=mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongodb-primary:27017,mongodb-secondary-1:27017,mongodb-secondary-2:27017/net4xyz?replicaSet=rs0&readPreference=secondaryPreferred
      - DATABASE_READ_URL=mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongodb-secondary-1:27017,mongodb-secondary-2:27017/net4xyz?replicaSet=rs0&readPreference=secondaryPreferred
      - DATABASE_WRITE_URL=mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongodb-primary:27017/net4xyz?replicaSet=rs0
      - JWT_SECRET=${JWT_SECRET}
      - IPFS_URL=http://ipfs:5001
      - PORT=3001
      - INSTANCE_ID=3
    ports:
      - "3003:3001"
    depends_on:
      mongodb-primary:
        condition: service_healthy
      - ipfs
    networks:
      - net4xyz-network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G

  # ===================
  # Load Balancer (Nginx)
  # ===================
  nginx:
    image: nginx:alpine
    container_name: net4xyz-nginx
    restart: always
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - nginx_logs:/var/log/nginx
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend-1
      - backend-2
      - backend-3
    networks:
      - net4xyz-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

  # ===================
  # Monitoring Stack
  # ===================
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: net4xyz-prometheus
    restart: always
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    networks:
      - net4xyz-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G

  grafana:
    image: grafana/grafana:10.2.0
    container_name: net4xyz-grafana
    restart: always
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3030:3000"
    networks:
      - net4xyz-network
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

  # ===================
  # Logging Stack
  # ===================
  loki:
    image: grafana/loki:2.9.0
    container_name: net4xyz-loki
    restart: always
    volumes:
      - ./loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    ports:
      - "3100:3100"
    networks:
      - net4xyz-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G

  promtail:
    image: grafana/promtail:2.9.0
    container_name: net4xyz-promtail
    restart: always
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/log:/var/log
      - nginx_logs:/var/log/nginx
    networks:
      - net4xyz-network
    depends_on:
      - loki

  # ===================
  # Alert Manager
  # ===================
  alertmanager:
    image: prom/alertmanager:v0.26.0
    container_name: net4xyz-alertmanager
    restart: always
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    ports:
      - "9093:9093"
    networks:
      - net4xyz-network
    depends_on:
      - prometheus

  # ===================
  # cAdvisor (Container monitoring)
  # ===================
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.2
    container_name: net4xyz-cadvisor
    restart: always
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    ports:
      - "8081:8080"
    networks:
      - net4xyz-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1G

  # ===================
  # Node Exporter (System metrics)
  # ===================
  node-exporter:
    image: prom/node-exporter:v1.7.0
    container_name: net4xyz-node-exporter
    restart: always
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/host'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host:ro
    ports:
      - "9100:9100"
    networks:
      - net4xyz-network

  # ===================
  # MongoDB Exporter
  # ===================
  mongodb-exporter:
    image: percona/mongodb_exporter:0.40.0
    container_name: net4xyz-mongodb-exporter
    restart: always
    environment:
      - MONGODB_URI=mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongodb-primary:27017
      - MONGODB_DB=net4xyz
    ports:
      - "9216:9216"
    networks:
      - net4xyz-network
    depends_on:
      - mongodb-primary

  # ===================
  # Backup Service
  # ===================
  backup:
    image: mongo:7.0
    container_name: net4xyz-backup
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      BACKUP_CRON: "0 2 * * *"
      BACKUP_RETENTION_DAYS: 30
    volumes:
      - backup_data:/backup
      - ./backup-scripts:/scripts
    networks:
      - net4xyz-network
    depends_on:
      - mongodb-primary

  # ===================
  # AI Engine (Optional - can be scaled independently)
  # ===================
  ai-engine:
    build:
      context: ..
      dockerfile: packages/ai-engine/Dockerfile
    container_name: net4xyz-ai-engine
    restart: always
    environment:
      - NODE_ENV=production
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OLLAMA_BASE_URL=http://ollama:11434
      - VLLM_BASE_URL=http://vllm:8000
      - DEFAULT_LOCAL_MODEL=llama3:70b
    ports:
      - "8000:8000"
    volumes:
      - ai_models:/models
    networks:
      - net4xyz-network
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 16G
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

volumes:
  mongodb_data_primary:
  mongodb_data_secondary_1:
  mongodb_data_secondary_2:
  mongodb_config:
  ipfs_data:
  ipfs_staging:
  nginx_logs:
  prometheus_data:
  grafana_data:
  loki_data:
  alertmanager_data:
  backup_data:
  ai_models:

networks:
  net4xyz-network:
    driver: bridge